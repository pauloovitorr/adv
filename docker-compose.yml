version: '3.8'

services:
  crm-app:
    build: .
    container_name: crm_advogados_app
    restart: always
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_BASE=${DB_BASE}
    networks:
      - rede_portfolio

networks:
  rede_portfolio:
    external: true